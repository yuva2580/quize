<!DOCTYPE html>
<html>
<head>
<title>View Answer Key</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input{
padding:10px;
width:250px;
margin:10px;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
}
</style>

</head>

<body>

<div class="box">

<h2>Enter Registration Number</h2>

<form method="POST">

<input type="text" name="regno" placeholder="Reg Number" required>

<br>

<button type="submit">View Answer Key</button>

</form>

<p style="color:red;">{{error}}</p>

</div>

</body>
</html>
