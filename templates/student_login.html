<!DOCTYPE html>
<html>
<head>

<title>Student Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#6a11cb,#2575fc);
}

.login-box{

background:white;
padding:40px;
border-radius:10px;
width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;

}

button{
width:100%;
padding:12px;
background:#2575fc;
color:white;
border:none;
border-radius:6px;
font-size:16px;

}

button:hover{
background:#1a5edb;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<form action="/student_login"  method="POST">

<input type="regno" name="regno" placeholder="Registration Number"  value ={{regno}} >
<input type="password" name="password" placeholder="Password" value ={{password}} >

<button type="submit">Start</button>
<p>Don't Have an login </p>
<a href="/register" method="GET" style="display:block;margin-top:15px;color:#2575fc;text-decoration:none;">Register</a>

</form>

</div>

</body>
</html>
