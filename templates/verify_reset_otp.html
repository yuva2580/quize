<!DOCTYPE html>
<html>
<head>

<title>verify reset otp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#667eea,#764ba2);

}

.login-container{

background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;

animation:fadeIn 1s;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.login-container h2{

margin-bottom:25px;
color:#333;

}

.input-group{

position:relative;
margin-bottom:20px;

}

.input-group input{

width:100%;
padding:12px 40px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
font-size:15px;

}

.input-group i{

position:absolute;
top:12px;
left:12px;
color:#888;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#5563d1;

}

.footer{

margin-top:15px;
font-size:13px;
color:#777;

}

</style>

</head>

<body>

<div class="login-container">

<h2>Verify Reset OTP</h2>

<form  action="/verify_reset_otp" method="POST">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" name="otp" placeholder="Enter your OTP" required>
</div>

<button type="submit">Verify OTP</button><br><br>
<a id="resendbtn" href="#" onclick="resendOTP()" style="text-decoration: none;">Resend OTP</a>

</form>

<div class="footer">
YuvaExam Management System
</div>

</div>
<script>

let btn = document.getElementById('resendbtn');
let time = 60;

btn.disabled = true;

let timer = setInterval(()=>{
    btn.innerText = `Resend OTP in ${time--}s`;
    time--;

    if(time < 0){
        clearInterval(timer);
        btn.innerText = 'Resend OTP';
        btn.disabled = false;
    }
},1000);
function resendOTP(){
    window.location.href='/resend_otp';
}
</script>

</script>

</body>
</html>
